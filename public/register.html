<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width:350px;">
  <h3 class="text-center mb-3">Crear Cuenta</h3>

  <input id="username" class="form-control mb-2" placeholder="Usuario">
  <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

  <button class="btn btn-success w-100" onclick="register()">Registrar</button>

  <div id="msg" class="text-center mt-2"></div>

  <a href="login.html" class="text-center mt-3 d-block">Volver al login</a>
</div>

<script>
async function register() {
  const res = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerHTML = data.mensaje
    ? `<span class="text-success">${data.mensaje}</span>`
    : `<span class="text-danger">${data.error}</span>`;
}
</script>

</body>
</html>
