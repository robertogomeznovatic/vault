<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vault</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-4">
  <div class="container-fluid">

    <span class="navbar-brand fw-semibold fs-5">
      🔐 Password Vault
    </span>

    <div class="d-flex align-items-center gap-3">

      <span class="text-light small opacity-75" id="user">
      </span>

      <button class="btn btn-danger btn-sm px-3 rounded-pill" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Salir
      </button>

    </div>

  </div>
</nav>


<div class="container mt-4">

  <div class="card shadow p-3 mb-4">
    <h5>Guardar nueva contraseña</h5>
    <div class="row">
      <div class="col"><input id="usuario" class="form-control" placeholder="Usuario" required></div>
      <div class="col"><input id="contrasena" class="form-control" placeholder="Contraseña" required></div>
      <div class="col"><input id="url" class="form-control" placeholder="URL"></div>
      <div class="col"><input id="etiqueta" class="form-control" placeholder="Etiqueta" required></div>
    </div>
    <button class="btn btn-primary mt-3" onclick="guardar()">Guardar</button>
  </div>

  <div class="card shadow p-3">
    <h5>Mis contraseñas</h5>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Contraseña</th>
          <th>URL</th>
          <th>Etiqueta</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

</div>

<script>

const token = localStorage.getItem('token');
const username = localStorage.getItem('user');

if (!token) location.href = "login.html";

document.getElementById("user").innerText = username;

async function cargar() {
  const res = await fetch('/vault', {
    headers: { Authorization: token }
  });

  const data = await res.json();

  tabla.innerHTML = data.map(v => `
    <tr>
      <td>${v.usuario}</td>
      <td><input class="form-control input-pass" type="password" id="password1" value="${v.contrasena}" readonly></td>
      <td>${v.url || ''}</td>
      <td>${v.etiqueta || ''}</td>
      <td>
        <button class="btn btn-sm btn-danger" onclick="eliminar(${v.id})">
          🗑️
        </button>
      </td>
      <td><button class="form-control text-center" onclick="togglePassword(this)">👁 </button></td>
    </tr>
  `).join('');
}

function togglePassword(btn) {
  const fila = btn.closest("tr");
  const input = fila.querySelector("input");
  const icon = btn.querySelector("i");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
}

async function eliminar(id) {
  if (!confirm("¿Seguro que deseas eliminar este registro?")) return;

  try {
    const res = await fetch('/vault/' + id, {
      method: 'DELETE',
      headers: {
        Authorization: localStorage.getItem('token')
      }
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Error al eliminar");
      return;
    }

    cargar();
  } catch (err) {
    console.error("Error eliminar:", err);
    alert("Error de conexión");
  }
}

async function guardar() {
  await fetch('/vault', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: token
    },
    body: JSON.stringify({
      usuario: usuario.value,
      contrasena: contrasena.value,
      url: url.value,
      etiqueta: etiqueta.value
    })
  });

  usuario.value = '';
  contrasena.value = '';
  url.value = '';
  etiqueta.value = '';
  cargar();
}

function logout() {
  localStorage.removeItem('token');
  location.href = "login.html";
}

cargar();
</script>

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container-fluid justify-content-center">

    <span class="small text-center fs-5 navbar-brand">
      © 2026 — Desarrollado por <strong>Roberto Gómez Mendoza</strong> · Todos los derechos reservados
    </span>

  </div>
</nav>

</body>
</html>
