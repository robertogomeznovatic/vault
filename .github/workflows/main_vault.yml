name: Build and deploy Node.js app to Azure Web App - vaults

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'   # LTS recomendado por Azure
      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present
      # Si no tienes tests, comentar la siguiente línea
      #- npm run test --if-present
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules
            !\.git
            !\.github

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vaults'    # debe coincidir con msdeploySite
          slot-name: ''          # dejar vacío si no hay slots
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
